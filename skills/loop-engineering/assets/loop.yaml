apiVersion: loop-engineering/v1
kind: Loop
metadata:
  name: example-loop
  owner: engineering
  description: "Template for a recurring Loop-Engineering workflow."
  risk: medium
  tags:
    - loop-engineering
goal:
  objective: "Advance a recurring engineering goal through bounded discovery, isolated work, independent verification, and persisted state."
  acceptanceCriteria:
    - "Each run handles only bounded discovered work."
    - "Each completed item has evaluator evidence."
  stopConditions:
    - "No eligible items are discovered."
    - "The run reaches the configured budget or timeout."
  blockedConditions:
    - "Required credentials or repository access are missing."
    - "A required human-only action is needed."
discovery:
  sources:
    - type: manual
      description: "Replace with CI, issues, pull requests, logs, or another bounded source."
  ranking:
    strategy: "Prefer high-impact items with deterministic metadata before LLM judgment."
    deterministicFirst: true
  maxItemsPerRun: 3
handoff:
  worker: generator-agent
  isolation: worktree
  worktree:
    enabled: true
    branchPrefix: loop-engineering/example-loop
  permissions:
    - read-repo
    - write-worktree
    - run-tests
  prompt: "Implement the smallest safe change for one discovered item. Do not evaluate your own work."
verification:
  evaluator: evaluator-agent
  independent: true
  defaultStance: assume-broken
  requiredEvidence:
    - diff-review
    - tests
  commands:
    - "npm test"
  verdicts:
    - pass
    - fail
    - blocked
    - needs-human
persistence:
  statePath: ".loop-engineering/loops/example-loop/state.json"
  runLogDir: ".loop-engineering/loops/example-loop/runs"
  inboxPath: ".loop-engineering/loops/example-loop/inbox.md"
  decisionsPath: ".loop-engineering/loops/example-loop/decisions.md"
schedule:
  runtime: manual
  cadence: "manual"
  timezone: "UTC"
  timeoutMinutes: 30
  concurrency:
    group: example-loop
    cancelInProgress: false
runner:
  executor: dry-run
  workingDirectory: "."
  pollSeconds: 30
safety:
  budgets:
    maxItemsPerRun: 3
    maxDailyRuns: 2
    maxRuntimeMinutes: 30
    maxEstimatedUsdPerRun: 5
  retries:
    maxRetriesPerItem: 1
    onRepeatedFailure: move-to-inbox
  humanGates:
    autoAllowed:
      - "read-repository"
      - "write-isolated-worktree"
      - "run-tests"
    needsReview:
      - "review-local-draft"
    humanOnly:
      - "open-pull-request"
      - "comment-on-issue"
      - "merge-pull-request"
      - "deploy-production"
      - "delete-data"
      - "spend-money"
      - "change-permissions"
  failurePolicy:
    onBudgetExceeded: stop-run
    onUnsafeAction: block
evolution:
  enabled: false
  target: task-strategy
  initialStrategy: "Use the smallest safe change, inspect deterministic evidence first, and preserve existing behavior outside the current work item."
  trigger:
    afterRuns: 5
    consecutiveFailures: 2
  metric:
    name: verified-pass-rate
    direction: maximize
    minimumSamples: 3
    minimumImprovement: 0.1
  evaluator:
    name: strategy-benchmark-evaluator
    independent: true
    commands:
      - "npm test"
  promotion:
    mode: human-review
outputs:
  - run-summary
  - inbox-update
