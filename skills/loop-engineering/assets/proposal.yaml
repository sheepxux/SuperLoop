apiVersion: loop-engineering/v1
kind: LoopProposal
metadata:
  id: example-loop-proposal
  revision: 1
  parentProposalSha256: null
createdAt: "2026-07-15T00:00:00Z"
sourceIdea: "Keep finding and safely fixing the most important maintenance work in this repository."
routing:
  classification: agentic-loop
  executionShape: continuous-stream
  rationale: "The work recurs, requires judgment during discovery, and must carry verified state across bounded runs."
  signals:
    - recurring work
    - judgment-based discovery
    - durable progress required
readiness:
  status: needs-input
  blockers:
    - assumption-node-project
    - prereq-repository-access
  warnings: []
goal:
  objective:
    id: goal-maintenance
    statement: "Keep a recurring engineering backlog moving through bounded, independently verified changes."
    outcome: "Eligible maintenance items become verified local changes or explicit blocked records."
    measurement: "Verified pass rate and unresolved inbox count per bounded run."
  acceptanceCriteria:
    - id: ac-bounded-work
      statement: "Each run attempts no more than three deterministically ranked items."
      evidence:
        - artifact-review
      passCondition: "The run log records at most three attempted items in deterministic rank order."
    - id: ac-independent-verification
      statement: "Every completed item has independent diff review and passing test evidence."
      evidence:
        - diff-review
        - tests
      passCondition: "The evaluator records pass with both diff review and a successful test command."
  nonGoals:
    - id: non-goal-auto-merge
      condition: "Do not merge, deploy, or modify production systems automatically."
  stopConditions:
    - id: stop-no-work
      condition: "No eligible items are discovered."
    - id: stop-budget
      condition: "The run reaches the configured budget or timeout."
  blockedConditions:
    - id: blocked-access
      condition: "Required credentials or repository access are missing."
    - id: blocked-human-action
      condition: "A required human-only action is needed."
questions: []
assumptions:
  - id: assumption-node-project
    statement: "The repository exposes a deterministic npm test command."
    status: unconfirmed
    blocking: true
prerequisites:
  - id: prereq-repository-access
    kind: access
    requirement: "Read and isolated worktree access to the target repository."
    status: missing
    blocking: true
risks:
  - id: risk-unintended-change
    severity: medium
    description: "A maintenance patch could change behavior outside the selected item."
    mitigation: "Use an isolated worktree and independent diff review before any external action."
    status: mitigated
    blocking: true
alternative: null
candidate:
  acceptanceTrace:
    - acceptanceId: ac-bounded-work
      loopCriterion: "Each run attempts no more than three deterministically ranked items."
      evidence:
        - artifact-review
    - acceptanceId: ac-independent-verification
      loopCriterion: "Every completed item has independent diff review and passing test evidence."
      evidence:
        - diff-review
        - tests
  actionTrace:
    - kind: permission
      value: read-repo
      actionId: read-repository
      gate: autoAllowed
    - kind: permission
      value: write-worktree
      actionId: write-isolated-worktree
      gate: autoAllowed
    - kind: permission
      value: run-tests
      actionId: run-tests
      gate: autoAllowed
    - kind: output
      value: run-summary
      actionId: write-run-summary
      gate: autoAllowed
    - kind: output
      value: inbox-update
      actionId: update-inbox
      gate: autoAllowed
  loop:
    apiVersion: loop-engineering/v1
    kind: Loop
    metadata:
      name: example-loop
      owner: engineering
      description: "A proposed recurring repository-maintenance Loop."
      risk: medium
      tags:
        - loop-engineering
        - idea-to-loop
    goal:
      objective: "Keep a recurring engineering backlog moving through bounded, independently verified changes."
      acceptanceCriteria:
        - "Each run attempts no more than three deterministically ranked items."
        - "Every completed item has independent diff review and passing test evidence."
      stopConditions:
        - "No eligible items are discovered."
        - "The run reaches the configured budget or timeout."
      blockedConditions:
        - "Required credentials or repository access are missing."
        - "A required human-only action is needed."
    discovery:
      sources:
        - type: repository
          description: "Inspect bounded issue, test, dependency, and static-analysis signals."
      ranking:
        strategy: "Rank deterministic severity and reproducibility signals before agent judgment."
        deterministicFirst: true
      maxItemsPerRun: 3
    handoff:
      worker: generator-agent
      isolation: worktree
      worktree:
        enabled: true
        branchPrefix: loop-engineering/example-loop
      permissions:
        - read-repo
        - write-worktree
        - run-tests
      prompt: "Implement the smallest safe change for one discovered item. Do not evaluate your own work."
    verification:
      evaluator: evaluator-agent
      independent: true
      defaultStance: assume-broken
      requiredEvidence:
        - artifact-review
        - diff-review
        - tests
      commands:
        - "npm test"
      verdicts:
        - pass
        - fail
        - blocked
        - needs-human
    persistence:
      statePath: ".loop-engineering/loops/example-loop/state.json"
      runLogDir: ".loop-engineering/loops/example-loop/runs"
      inboxPath: ".loop-engineering/loops/example-loop/inbox.md"
      decisionsPath: ".loop-engineering/loops/example-loop/decisions.md"
    schedule:
      runtime: manual
      cadence: "manual"
      timezone: "UTC"
      timeoutMinutes: 30
      concurrency:
        group: example-loop
        cancelInProgress: false
    runner:
      executor: dry-run
      workingDirectory: "."
      pollSeconds: 30
    safety:
      budgets:
        maxItemsPerRun: 3
        maxDailyRuns: 2
        maxRuntimeMinutes: 30
        maxEstimatedUsdPerRun: 5
      retries:
        maxRetriesPerItem: 1
        onRepeatedFailure: move-to-inbox
      humanGates:
        autoAllowed:
          - read-repository
          - write-isolated-worktree
          - run-tests
          - write-run-summary
          - update-inbox
        needsReview:
          - review-local-draft
        humanOnly:
          - open-pull-request
          - comment-on-issue
          - merge-pull-request
          - deploy-production
          - delete-data
          - spend-money
          - change-permissions
      failurePolicy:
        onBudgetExceeded: stop-run
        onUnsafeAction: block
    evolution:
      enabled: false
      target: task-strategy
      initialStrategy: "Use the smallest safe change, inspect deterministic evidence first, and preserve behavior outside the selected item."
      trigger:
        afterRuns: 5
        consecutiveFailures: 2
      metric:
        name: verified-pass-rate
        direction: maximize
        minimumSamples: 3
        minimumImprovement: 0.1
      evaluator:
        name: strategy-benchmark-evaluator
        independent: true
        commands:
          - "npm test"
      promotion:
        mode: human-review
    outputs:
      - run-summary
      - inbox-update
